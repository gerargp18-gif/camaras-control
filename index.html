```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard General — Cámaras</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f2f5; }

.layout { display: flex; min-height: 100vh; }

.sidebar { width: 200px; background: #1e2535; padding: 1.5rem 0; }
.sidebar-logo { padding: 0 1.25rem 1.5rem; font-size: 13px; color: rgba(255,255,255,0.5); }
.sidebar-item { padding: 0.6rem 1.25rem; color: rgba(255,255,255,0.65); cursor: pointer; }
.sidebar-item.active { color: #fff; }

.main { flex: 1; padding: 1.5rem; }
.page-title { font-size: 18px; margin-bottom: 1.25rem; }

.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.25rem; }
.metric-card { background: #eef0f3; border-radius: 8px; padding: 1rem; }
.metric-value { font-size: 26px; }
.ok { color: #1d9e75; }
.fail { color: #d85a30; }

.status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; }
.badge-ok { background: #eaf3de; color: #3b6d11; }
.badge-warn { background: #faeeda; color: #854f0b; }

.bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card { background: white; padding: 1rem; border-radius: 10px; }

.branch-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-track { flex: 1; height: 8px; background: #eee; display: flex; }
.bar-ok { background: #378add; }
.bar-fail { background: #d85a30; }
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="sidebar-logo">Cámaras</div>
  <div class="sidebar-item active">Dashboard general</div>
</div>

<div class="main">
  <div class="page-title">Resumen general</div>

  <div class="metrics">
    <div class="metric-card">
      <div>Total cámaras</div>
      <div class="metric-value" id="total">0</div>
    </div>
    <div class="metric-card">
      <div>Operativas</div>
      <div class="metric-value ok" id="ok">0</div>
    </div>
    <div class="metric-card">
      <div>Fallas</div>
      <div class="metric-value fail" id="fail">0</div>
    </div>
    <div class="metric-card">
      <div>Estado</div>
      <span id="estado" class="status-badge badge-ok">OK</span>
    </div>
  </div>

  <div class="bottom">
    <div class="card">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
      <div id="sucursales"></div>
    </div>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
  authDomain: "camaras-control.firebaseapp.com",
  projectId: "camaras-control"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let chart;

db.collection("camaras").onSnapshot(snapshot => {

  let total = 0, ok = 0, fail = 0;
  let sucursales = {};

  snapshot.forEach(doc => {
    let c = doc.data();

    total++;
    if(c.estado === "Activa") ok++; else fail++;

    if(!sucursales[c.sucursal]) {
      sucursales[c.sucursal] = {ok:0, fail:0};
    }

    if(c.estado === "Activa") sucursales[c.sucursal].ok++;
    else sucursales[c.sucursal].fail++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("ok").innerText = ok;
  document.getElementById("fail").innerText = fail;

  let porcentaje = total ? (fail/total)*100 : 0;
  let estado = document.getElementById("estado");

  if(porcentaje === 0){
    estado.innerText = "✅ Sin fallas";
    estado.className = "status-badge badge-ok";
  } else if(porcentaje < 30){
    estado.innerText = "⚠ Bajo";
    estado.className = "status-badge badge-warn";
  } else {
    estado.innerText = "🚨 Crítico";
    estado.className = "status-badge badge-warn";
  }

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
      labels: ["Operativas","Fallas"],
      datasets: [{
        data: [ok, fail],
        backgroundColor: ["#378add","#d85a30"]
      }]
    }
  });

  let cont = document.getElementById("sucursales");
  cont.innerHTML = "";

  Object.keys(sucursales).forEach(s => {
    let d = sucursales[s];
    let totalS = d.ok + d.fail;

    cont.innerHTML += `
      <div class="branch-row">
        <div style="width:100px">${s}</div>
        <div class="bar-track">
          <div class="bar-ok" style="width:${(d.ok/totalS)*100}%"></div>
          <div class="bar-fail" style="width:${(d.fail/totalS)*100}%"></div>
        </div>
        <div>${d.ok}/${d.fail}</div>
      </div>
    `;
  });

});
</script>

</body>
</html>
```
