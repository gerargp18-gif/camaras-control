```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cámaras PRO</title>

<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-firestore-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f0f2f5;display:flex}
.sidebar{width:220px;background:#1e2535;color:#fff;padding:20px 0}
.sidebar button{width:100%;background:none;border:none;color:#aaa;padding:10px 16px;text-align:left;cursor:pointer}
.sidebar button.active{color:#fff;background:#4a90d9}
.main{flex:1;padding:20px}

.section{display:none}
.section.visible{display:block}

.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.metric{background:#e8eaed;padding:10px;border-radius:8px}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd}

.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
</style>
</head>

<body>

<div class="sidebar">
<button class="active" onclick="mostrar('dashboard',this)">Dashboard</button>
<button onclick="mostrar('base',this)">Base cámaras</button>
<button onclick="mostrar('incidencias',this)">Incidencias</button>
<button onclick="mostrar('reportes',this)">Reportes</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section visible">
<div class="metrics">
<div class="metric">Total: <span id="total">0</span></div>
<div class="metric">OK: <span id="ok">0</span></div>
<div class="metric">Fallas: <span id="fail">0</span></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- BASE -->
<div id="base" class="section">
<div class="card">
<input id="nombre" placeholder="Nombre">
<input id="marca" placeholder="Marca">
<select id="estado">
<option>Activa</option>
<option>Falla</option>
</select>
<button class="btn btn-primary" onclick="addCam()">Guardar</button>
</div>

<div class="card">
<table>
<thead><tr><th>Nombre</th><th>Marca</th><th>Estado</th><th></th></tr></thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="section">
<div class="card">
<select id="camaraSelect"></select>
<input id="desc" placeholder="Descripción">
<input id="tec" placeholder="Técnico">
<button class="btn btn-primary" onclick="addInc()">Guardar</button>
</div>

<div class="card">
<table>
<thead><tr><th>Camara</th><th>Desc</th><th>Tec</th><th></th></tr></thead>
<tbody id="tablaInc"></tbody>
</table>
</div>
</div>

<!-- REPORTES -->
<div id="reportes" class="section">
<div class="card">
<input type="date" id="f1">
<input type="date" id="f2">
<button onclick="generarReporte()">Generar</button>
<button onclick="exportarExcel()">Excel</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Camara</th><th>Tecnico</th><th>Inicio</th><th>Fin</th><th>Horas</th>
</tr>
</thead>
<tbody id="tablaRep"></tbody>
</table>
</div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyBVs...",
authDomain:"camaras-control.firebaseapp.com",
projectId:"camaras-control"
}
firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let camaras=[]
let incidencias=[]
let chart

function mostrar(id,btn){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'))
document.getElementById(id).classList.add('visible')
document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'))
btn.classList.add('active')
}

function addCam(){
let n=nombre.value
let m=marca.value
let e=estado.value
db.collection("camaras").add({nombre:n,marca:m,estado:e})
}

function addInc(){
db.collection("incidencias").add({
camara:camaraSelect.value,
descripcion:desc.value,
tecnico:tec.value,
fechaInicio:new Date(),
fechaFin:null,
estatus:"Abierta"
})
}

function cerrar(id){
db.collection("incidencias").doc(id).update({
fechaFin:new Date(),
estatus:"Cerrada"
})
}

db.collection("camaras").onSnapshot(s=>{
camaras=s.docs.map(d=>({id:d.id,...d.data()}))
render()
})

db.collection("incidencias").onSnapshot(s=>{
incidencias=s.docs.map(d=>({id:d.id,...d.data()}))
renderInc()
})

function render(){
let total=camaras.length
let ok=camaras.filter(c=>c.estado=="Activa").length
let fail=total-ok

totalEl.innerText=total
okEl.innerText=ok
failEl.innerText=fail

if(chart)chart.destroy()
chart=new Chart(chartEl,{
type:"doughnut",
data:{labels:["OK","Fallas"],datasets:[{data:[ok,fail]}]}
})

tabla.innerHTML=camaras.map(c=>
`<tr>
<td>${c.nombre}</td>
<td>${c.marca}</td>
<td>${c.estado}</td>
<td><button onclick="db.collection('camaras').doc('${c.id}').delete()">X</button></td>
</tr>`).join("")

camaraSelect.innerHTML=camaras.map(c=>`<option>${c.nombre}</option>`).join("")
}

function renderInc(){
tablaInc.innerHTML=incidencias.map(i=>
`<tr>
<td>${i.camara}</td>
<td>${i.descripcion}</td>
<td>${i.tecnico}</td>
<td>${i.estatus=="Abierta"?`<button onclick="cerrar('${i.id}')">Cerrar</button>`:"OK"}</td>
</tr>`).join("")
}

function generarReporte(){
let f1=new Date(document.getElementById("f1").value)
let f2=new Date(document.getElementById("f2").value)

let data=incidencias.filter(i=>{
if(i.estatus!="Cerrada")return false
let fin=i.fechaFin?.toDate?i.fechaFin.toDate():new Date(i.fechaFin)
return fin>=f1 && fin<=f2
})

tablaRep.innerHTML=data.map(i=>{
let ini=new Date(i.fechaInicio)
let fin=new Date(i.fechaFin)
let hrs=((fin-ini)/3600000).toFixed(2)

return `<tr>
<td>${i.camara}</td>
<td>${i.tecnico}</td>
<td>${ini.toLocaleString()}</td>
<td>${fin.toLocaleString()}</td>
<td>${hrs}</td>
</tr>`
}).join("")
}

function exportarExcel(){
let csv="Camara,Tecnico,Inicio,Fin,Horas\n"
document.querySelectorAll("#tablaRep tr").forEach(r=>{
let cols=r.querySelectorAll("td")
csv+=Array.from(cols).map(td=>td.innerText).join(",")+"\n"
})
let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="reporte.csv"
a.click()
}

const totalEl=document.getElementById("total")
const okEl=document.getElementById("ok")
const failEl=document.getElementById("fail")
const chartEl=document.getElementById("chart")
</script>

</body>
</html>
```
