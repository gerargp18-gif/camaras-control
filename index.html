<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cámaras PRO++</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#eef2f7; display:flex; }
.sidebar { width:220px; background:#1e293b; color:white; height:100vh; padding:20px 10px; }
.sidebar button { width:100%; background:none; border:none; color:white; padding:10px; text-align:left; cursor:pointer; border-radius:6px; }
.sidebar button:hover { background:#334155; }
.main { flex:1; padding:20px; }
.card { background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.08);} 
input, select { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-top:5px; }
.primary { background:#2563eb; color:white; }
.delete { background:#dc2626; color:white; }
.hidden { display:none; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:10px; }
.bad { color:red; font-weight:bold; }
.good { color:green; font-weight:bold; }
table { width:100%; border-collapse:collapse; }
th, td { padding:8px; border-bottom:1px solid #eee; }
</style>
</head>
<body>

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('base')">Base cámaras</button>
<button onclick="mostrar('incidencias')">Incidencias</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="card">
<h3>Resumen</h3>
<p>Total: <span id="total"></span></p>
<p>Fallas: <span id="fall"></span></p>
<p>Estado: <span id="alerta"></span></p>
<canvas id="grafica"></canvas>
</div>

<!-- BASE -->
<div id="base" class="card hidden">
<h3>Base de cámaras</h3>

<input id="sucursal" placeholder="Sucursal">

<div class="grid">
<button onclick="filtroEstado=''">Todas</button>
<button onclick="filtroEstado='Activa'">Activas</button>
<button onclick="filtroEstado='Falla'">Fallas</button>
</div>

<p>Total: <span id="bTotal"></span> | Activas: <span id="bAct"></span> | Fallas: <span id="bFall"></span></p>

<input id="nombre" placeholder="Nombre de cámara">
<input id="marca" placeholder="Marca">
<input id="tipo" placeholder="Tipo">
<select id="estado"><option>Activa</option><option>Falla</option></select>
<button class="primary" onclick="guardarCamara()">Guardar</button>

<table>
<thead><tr><th>Nombre</th><th>Marca</th><th>Tipo</th><th>Sucursal</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody id="tablaCamaras"></tbody>
</table>
</div>

<!-- INCIDENCIAS -->
<div id="incidencias" class="card hidden">
<h3>Incidencias</h3>
<select id="camaraSelect"></select>
<input id="desc" placeholder="Descripción">
<input id="tecnico" placeholder="Técnico">
<button class="primary" onclick="addInc()">Guardar</button>
<table><tbody id="tablaInc"></tbody></table>
</div>

</div>

<script>
const firebaseConfig={apiKey:"AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",authDomain:"camaras-control.firebaseapp.com",projectId:"camaras-control"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
let chart,editId=null,filtroEstado='';

function mostrar(s){['dashboard','base','incidencias'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(s).classList.remove('hidden');}

function guardarCamara(){
 let n=nombre.value;
 let m=marca.value;
 let t=tipo.value;
 if(!n || !m || !t) return alert('Completa todos los campos');

 if(editId){ db.collection('camaras').doc(editId).update({nombre:n,marca:m,tipo:t,estado:estado.value,sucursal:sucursal.value}); editId=null; }
 else{ db.collection('camaras').add({nombre:n,marca:m,tipo:t,estado:estado.value,sucursal:sucursal.value,fecha:new Date().toISOString()}); }
}

function editar(id,n,m,t,e,su){ nombre.value=n; marca.value=m; tipo.value=t; estado.value=e; sucursal.value=su||''; editId=id; mostrar('base'); }
function eliminar(id){ if(confirm('¿Eliminar?')) db.collection('camaras').doc(id).delete(); }

function addInc(){ db.collection('incidencias').add({camara:camaraSelect.value,descripcion:desc.value,tecnico:tecnico.value}); }

function cargar(){
 let suc=sucursal.value.toLowerCase();
 let t=0,a=0,f=0;

 db.collection('camaras').onSnapshot(sn=>{
  tablaCamaras.innerHTML=''; camaraSelect.innerHTML='';

  sn.forEach(d=>{
   let c=d.data();
   if(suc && !c.sucursal?.toLowerCase().includes(suc)) return;
   if(filtroEstado && c.estado!=filtroEstado) return;

   t++; if(c.estado=='Activa')a++; else f++;

   tablaCamaras.innerHTML+=`<tr>
   <td>${c.nombre}</td>
   <td>${c.marca}</td>
   <td>${c.tipo}</td>
   <td>${c.sucursal||''}</td>
   <td class="${c.estado=='Falla'?'bad':'good'}">${c.estado}</td>
   <td>
   <button onclick="editar('${d.id}','${c.nombre}','${c.marca}','${c.tipo}','${c.estado}','${c.sucursal||''}')">✏️</button>
   <button class="delete" onclick="eliminar('${d.id}')">🗑️</button>
   </td></tr>`;

   camaraSelect.innerHTML+=`<option>${c.nombre}</option>`;
  });

  bTotal.innerText=t; bAct.innerText=a; bFall.innerText=f;

  total.innerText=t; fall.innerText=f;

  let p=t?f/t*100:0;
  alerta.innerText=p>50?'🔥 Crítico':p>20?'⚠️ Medio':'✅ OK';

  if(chart)chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Total','Fallas'],datasets:[{data:[t,f]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML='';
  sn.forEach(d=>{
   let i=d.data();
   tablaInc.innerHTML+=`<tr><td>${i.camara}</td><td>${i.descripcion}</td><td>${i.tecnico}</td></tr>`;
  });
 });
}

cargar();
</script>
</body>
</html>
