<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cámaras Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
input, select, textarea { padding:10px; margin:5px 0; width:100%; }
button { padding:8px 10px; margin:2px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
.edit { background:#ffc107; color:black; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; text-align:left; }
.bad { color:red; font-weight:bold; }
.good { color:green; font-weight:bold; }
</style>
</head>

<body>
<div class="container">

<!-- SELECCIONAR SUCURSAL -->
<div class="card">
<h2>Seleccionar Sucursal</h2>
<input id="nuevaSucursal" placeholder="Nueva sucursal">
<button onclick="agregarSucursal()">Agregar sucursal</button>
<select id="filtroSucursal" onchange="filtrarSucursal()"></select>
</div>

<!-- BASE DE DATOS POR SUCURSAL -->
<div class="card">
<h2>Equipos por Sucursal</h2>
<input id="eqNombre" placeholder="Nombre del equipo">
<input id="eqMarca" placeholder="Marca">
<input id="eqModelo" placeholder="Modelo">
<button onclick="guardarEquipo()">Guardar equipo</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Marca</th>
<th>Modelo</th>
<th>Sucursal</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaEquipos"></tbody>
</table>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
  authDomain: "camaras-control.firebaseapp.com",
  projectId: "camaras-control",
  storageBucket: "camaras-control.firebasestorage.app",
  messagingSenderId: "189054050500",
  appId: "1:189054050500:web:7cff88d426ea92202fe991"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let sucursalActual = '';

function agregarSucursal(){
  let nombre = document.getElementById('nuevaSucursal').value;
  if(!nombre) return alert('Escribe una sucursal');

  db.collection("sucursales").add({ nombre });
  document.getElementById('nuevaSucursal').value = '';
}

function cargarSucursales(){
  db.collection("sucursales").onSnapshot(snapshot => {
    let select = document.getElementById('filtroSucursal');
    select.innerHTML = '<option value="">Selecciona sucursal</option>';

    snapshot.forEach(doc => {
      let s = doc.data();
      select.innerHTML += `<option value="${s.nombre}">${s.nombre}</option>`;
    });
  });
}

function filtrarSucursal(){
  sucursalActual = document.getElementById('filtroSucursal').value;
  cargarEquipos();
}

function guardarEquipo(){
  let nombre = document.getElementById('eqNombre').value;
  let marca = document.getElementById('eqMarca').value;
  let modelo = document.getElementById('eqModelo').value;

  if(!nombre || !sucursalActual) return alert('Selecciona sucursal');

  db.collection("equipos").add({ nombre, marca, modelo, sucursal: sucursalActual });

  document.getElementById('eqNombre').value = '';
  document.getElementById('eqMarca').value = '';
  document.getElementById('eqModelo').value = '';
}

function cargarEquipos(){
  db.collection("equipos").onSnapshot(snapshot => {
    let tabla = document.getElementById('tablaEquipos');
    tabla.innerHTML = '';

    snapshot.forEach(doc => {
      let item = doc.data();

      if(sucursalActual && item.sucursal !== sucursalActual) return;

      tabla.innerHTML += `
      <tr>
        <td>${item.nombre}</td>
        <td>${item.marca}</td>
        <td>${item.modelo}</td>
        <td>${item.sucursal}</td>
        <td><button onclick="eliminarEquipo('${doc.id}')">Eliminar</button></td>
      </tr>`;
    });
  });
}

function eliminarEquipo(id){
  db.collection("equipos").doc(id).delete();
}

cargarSucursales();
cargarEquipos();
</script>

</body>
</html>
