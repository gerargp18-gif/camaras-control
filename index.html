<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cámaras PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: 'Segoe UI', Arial; background:#eef2f7; }

.header {
  background:#1e293b;
  color:white;
  padding:15px 20px;
  font-size:18px;
  font-weight:bold;
}

.container { padding:20px; max-width:1200px; margin:auto; }

.card {
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2 { margin-top:0; }

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.primary { background:#2563eb; color:white; }
.success { background:#16a34a; color:white; }
.warning { background:#f59e0b; color:white; }

.btn-group { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.stat {
  font-size:20px;
  font-weight:bold;
}

.stat small {
  display:block;
  color:#6b7280;
  font-weight:normal;
}

table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #eee; }

.bad { color:#dc2626; font-weight:bold; }
.good { color:#16a34a; font-weight:bold; }
</style>
</head>
<body>

<div class="header">📊 Sistema Profesional de Cámaras</div>

<div class="container">

<div class="card">
<h2>Sucursal</h2>
<input id="nuevaSucursal" placeholder="Nueva sucursal">
<div class="btn-group">
<button class="btn primary" onclick="addSucursal()">Agregar</button>
</div>
<select id="sucursal" onchange="cargarTodo()"></select>
</div>

<div class="grid">

<div class="card">
<h2>Equipos</h2>
<input id="eqNombre" placeholder="Nombre">
<input id="eqMarca" placeholder="Marca">
<input id="eqModelo" placeholder="Modelo">
<div class="btn-group">
<button class="btn success" onclick="addEquipo()">Guardar</button>
</div>
<table><tbody id="tablaEquipos"></tbody></table>
</div>

<div class="card">
<h2>Cámaras</h2>
<select id="equipoSelect"></select>
<input id="serie" placeholder="Serie">
<select id="estado">
<option>Activa</option>
<option>Falla</option>
</select>
<div class="btn-group">
<button class="btn success" onclick="addCamara()">Guardar</button>
</div>
<table><tbody id="tablaCamaras"></tbody></table>
</div>

</div>

<div class="card">
<h2>Incidencias</h2>
<select id="camaraSelect"></select>
<textarea id="desc" placeholder="Descripción"></textarea>
<input id="tecnico" placeholder="Técnico">
<div class="btn-group">
<button class="btn warning" onclick="addInc()">Registrar</button>
</div>
<table><tbody id="tablaInc"></tbody></table>
</div>

<div class="grid">
<div class="card">
<div class="stat">📦 <span id="rTotal"></span><small>Total cámaras</small></div>
</div>
<div class="card">
<div class="stat">🟢 <span id="rActivas"></span><small>Activas</small></div>
</div>
<div class="card">
<div class="stat">🔴 <span id="rFallas"></span><small>Fallas</small></div>
</div>
<div class="card">
<div class="stat">⚠️ <span id="rInc"></span><small>Incidencias</small></div>
</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
 authDomain: "camaras-control.firebaseapp.com",
 projectId: "camaras-control",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let chart;

function addSucursal(){ db.collection('sucursales').add({nombre:nuevaSucursal.value}); }

function addEquipo(){ db.collection('equipos').add({nombre:eqNombre.value,marca:eqMarca.value,modelo:eqModelo.value,sucursal:sucursal.value}); }

function addCamara(){ db.collection('camaras').add({equipo:equipoSelect.value,serie:serie.value,estado:estado.value,sucursal:sucursal.value}); }

function addInc(){ db.collection('incidencias').add({camara:camaraSelect.value,descripcion:desc.value,tecnico:tecnico.value,fecha:new Date().toISOString()}); }

function cargarSucursales(){
 db.collection('sucursales').onSnapshot(s=>{
  sucursal.innerHTML='';
  s.forEach(d=>sucursal.innerHTML+=`<option>${d.data().nombre}</option>`);
 });
}

function cargarTodo(){
 let s=sucursal.value;
 let total=0,act=0,fall=0,inc=0;

 db.collection('equipos').where('sucursal','==',s).onSnapshot(sn=>{
  tablaEquipos.innerHTML='';
  equipoSelect.innerHTML='';
  sn.forEach(d=>{
    let e=d.data();
    tablaEquipos.innerHTML+=`<tr><td>${e.nombre}</td></tr>`;
    equipoSelect.innerHTML+=`<option>${e.nombre}</option>`;
  });
 });

 db.collection('camaras').where('sucursal','==',s).onSnapshot(sn=>{
  tablaCamaras.innerHTML='';
  camaraSelect.innerHTML='';
  total=0;act=0;fall=0;

  sn.forEach(d=>{
    let c=d.data();
    total++;
    if(c.estado==='Activa') act++; else fall++;
    tablaCamaras.innerHTML+=`<tr><td>${c.serie}</td><td class="${c.estado==='Falla'?'bad':'good'}">${c.estado}</td></tr>`;
    camaraSelect.innerHTML+=`<option>${c.serie}</option>`;
  });

  rTotal.innerText=total;
  rActivas.innerText=act;
  rFallas.innerText=fall;

  if(chart) chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Activas','Fallas'],datasets:[{data:[act,fall]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML='';
  inc=0;
  sn.forEach(d=>{
    let i=d.data();
    inc++;
    tablaInc.innerHTML+=`<tr><td>${i.camara}</td><td>${i.descripcion}</td><td>${i.tecnico}</td></tr>`;
  });
  rInc.innerText=inc;
 });
}

cargarSucursales();
</script>
</body>
</html>
