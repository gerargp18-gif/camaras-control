<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cámaras PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.1);} 
input, select, textarea { padding:10px; margin:5px 0; width:100%; border-radius:6px; border:1px solid #ccc; }

.btn-group { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; }
.primary { background:#007bff; color:white; }
.success { background:#28a745; color:white; }
.warning { background:#ffc107; }
.danger { background:#dc3545; color:white; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
</style>
</head>
<body>
<div class="container">

<!-- SUCURSAL -->
<div class="card">
<h2>Sucursal</h2>
<input id="nuevaSucursal" placeholder="Nueva sucursal">
<div class="btn-group">
<button class="primary" onclick="addSucursal()">Agregar</button>
</div>
<select id="sucursal" onchange="cargarTodo()"></select>
</div>

<!-- EQUIPOS -->
<div class="card">
<h2>Equipos</h2>
<input id="eqNombre" placeholder="Nombre">
<input id="eqMarca" placeholder="Marca">
<input id="eqModelo" placeholder="Modelo">
<div class="btn-group">
<button class="success" onclick="addEquipo()">Guardar equipo</button>
</div>
<table><tbody id="tablaEquipos"></tbody></table>
</div>

<!-- CAMARAS -->
<div class="card">
<h2>Cámaras</h2>
<select id="equipoSelect"></select>
<input id="serie" placeholder="Serie">
<select id="estado">
<option>Activa</option>
<option>Falla</option>
</select>
<div class="btn-group">
<button class="success" onclick="addCamara()">Guardar cámara</button>
</div>
<table><tbody id="tablaCamaras"></tbody></table>
</div>

<!-- INCIDENCIAS -->
<div class="card">
<h2>Incidencias</h2>
<select id="camaraSelect"></select>
<textarea id="desc" placeholder="Descripción"></textarea>
<input id="tecnico" placeholder="Técnico">
<div class="btn-group">
<button class="warning" onclick="addInc()">Registrar incidencia</button>
</div>
<table><tbody id="tablaInc"></tbody></table>
</div>

<!-- DASHBOARD -->
<div class="grid">
<div class="card">
<h3>Resumen</h3>
<p>Total: <span id="rTotal"></span></p>
<p>Activas: <span id="rActivas"></span></p>
<p>Fallas: <span id="rFallas"></span></p>
<p>Incidencias: <span id="rInc"></span></p>
</div>

<div class="card">
<h3>Gráfica</h3>
<canvas id="grafica"></canvas>
</div>
</div>

</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
 authDomain: "camaras-control.firebaseapp.com",
 projectId: "camaras-control",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let chart;

function addSucursal(){ db.collection('sucursales').add({nombre:nuevaSucursal.value}); }

function addEquipo(){
 db.collection('equipos').add({
  nombre:eqNombre.value,
  marca:eqMarca.value,
  modelo:eqModelo.value,
  sucursal:sucursal.value
 });
}

function addCamara(){
 db.collection('camaras').add({
  equipo:equipoSelect.value,
  serie:serie.value,
  estado:estado.value,
  sucursal:sucursal.value
 });
}

function addInc(){
 db.collection('incidencias').add({
  camara:camaraSelect.value,
  descripcion:desc.value,
  tecnico:tecnico.value,
  fecha:new Date().toISOString()
 });
}

function cargarSucursales(){
 db.collection('sucursales').onSnapshot(s=>{
  sucursal.innerHTML='';
  s.forEach(d=>sucursal.innerHTML+=`<option>${d.data().nombre}</option>`);
 });
}

function cargarTodo(){
 let s=sucursal.value;
 let total=0,act=0,fall=0,inc=0;

 db.collection('equipos').where('sucursal','==',s).onSnapshot(sn=>{
  tablaEquipos.innerHTML='';
  equipoSelect.innerHTML='';
  sn.forEach(d=>{
    let e=d.data();
    tablaEquipos.innerHTML+=`<tr><td>${e.nombre}</td></tr>`;
    equipoSelect.innerHTML+=`<option>${e.nombre}</option>`;
  });
 });

 db.collection('camaras').where('sucursal','==',s).onSnapshot(sn=>{
  tablaCamaras.innerHTML='';
  camaraSelect.innerHTML='';
  total=0;act=0;fall=0;

  sn.forEach(d=>{
    let c=d.data();
    total++;
    if(c.estado==='Activa') act++; else fall++;

    tablaCamaras.innerHTML+=`<tr><td>${c.serie}</td><td>${c.estado}</td></tr>`;
    camaraSelect.innerHTML+=`<option>${c.serie}</option>`;
  });

  rTotal.innerText=total;
  rActivas.innerText=act;
  rFallas.innerText=fall;

  if(chart) chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Activas','Fallas'],datasets:[{data:[act,fall]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML='';
  inc=0;
  sn.forEach(d=>{
    let i=d.data();
    inc++;
    tablaInc.innerHTML+=`<tr><td>${i.camara}</td><td>${i.descripcion}</td><td>${i.tecnico}</td></tr>`;
  });
  rInc.innerText=inc;
 });
}

cargarSucursales();
</script>
</body>
</html>
