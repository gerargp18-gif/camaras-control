<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Integral de Cámaras</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
input, select, textarea { padding:10px; margin:5px 0; width:100%; }
button { padding:8px 10px; margin:2px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>Sucursal</h2>
<input id="nuevaSucursal" placeholder="Nueva sucursal">
<button onclick="addSucursal()">Agregar</button>
<select id="sucursal" onchange="cargarTodo()"></select>
</div>

<div class="card">
<h2>Equipos</h2>
<input id="eqNombre" placeholder="Nombre">
<input id="eqMarca" placeholder="Marca">
<input id="eqModelo" placeholder="Modelo">
<button onclick="addEquipo()">Guardar</button>
<table><tbody id="tablaEquipos"></tbody></table>
</div>

<div class="card">
<h2>Cámaras</h2>
<select id="equipoSelect"></select>
<input id="serie" placeholder="Serie">
<select id="estado">
<option>Activa</option>
<option>Falla</option>
</select>
<button onclick="addCamara()">Guardar</button>
<table><tbody id="tablaCamaras"></tbody></table>
</div>

<div class="card">
<h2>Incidencias</h2>
<select id="camaraSelect"></select>
<textarea id="desc"></textarea>
<button onclick="addInc()">Guardar</button>
<table><tbody id="tablaInc"></tbody></table>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
  authDomain: "camaras-control.firebaseapp.com",
  projectId: "camaras-control",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let chart;

function addSucursal(){
 let n=document.getElementById('nuevaSucursal').value;
 db.collection('sucursales').add({nombre:n});
}

function addEquipo(){
 let s=document.getElementById('sucursal').value;
 db.collection('equipos').add({
  nombre:eqNombre.value,
  marca:eqMarca.value,
  modelo:eqModelo.value,
  sucursal:s
 });
}

function addCamara(){
 db.collection('camaras').add({
  equipo:equipoSelect.value,
  serie:serie.value,
  estado:estado.value,
  sucursal:sucursal.value
 });
}

function addInc(){
 db.collection('incidencias').add({
  camara:camaraSelect.value,
  descripcion:desc.value
 });
}

function cargarSucursales(){
 db.collection('sucursales').onSnapshot(s=>{
  sucursal.innerHTML='';
  s.forEach(d=>sucursal.innerHTML+=`<option>${d.data().nombre}</option>`);
 });
}

function cargarTodo(){
 let s=sucursal.value;

 db.collection('equipos').where('sucursal','==',s).onSnapshot(sn=>{
  tablaEquipos.innerHTML='';
  equipoSelect.innerHTML='';
  sn.forEach(d=>{
    let e=d.data();
    tablaEquipos.innerHTML+=`<tr><td>${e.nombre}</td></tr>`;
    equipoSelect.innerHTML+=`<option>${e.nombre}</option>`;
  });
 });

 db.collection('camaras').where('sucursal','==',s).onSnapshot(sn=>{
  tablaCamaras.innerHTML='';
  camaraSelect.innerHTML='';
  let a=0,f=0;

  sn.forEach(d=>{
    let c=d.data();
    tablaCamaras.innerHTML+=`<tr><td>${c.serie}</td><td>${c.estado}</td></tr>`;
    camaraSelect.innerHTML+=`<option>${c.serie}</option>`;
    if(c.estado==='Activa')a++; else f++;
  });

  if(chart) chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Activas','Fallas'],datasets:[{data:[a,f]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML='';
  sn.forEach(d=>{
    let i=d.data();
    tablaInc.innerHTML+=`<tr><td>${i.camara}</td><td>${i.descripcion}</td></tr>`;
  });
 });
}

cargarSucursales();
</script>
</body>
</html>
