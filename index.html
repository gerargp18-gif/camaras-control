<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Cámaras PRO+</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: 'Segoe UI'; background:#eef2f7; }
.header { background:#1e293b; color:white; padding:15px; font-weight:bold; }
.container { padding:20px; max-width:1200px; margin:auto; }
.card { background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.08);} 
input, select, textarea { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; margin-top:5px; }
.primary { background:#2563eb; color:white; }
.success { background:#16a34a; color:white; }
.warning { background:#f59e0b; color:white; }
.danger { background:#dc2626; color:white; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:10px; }
table { width:100%; margin-top:10px; border-collapse:collapse; }
th, td { padding:8px; border-bottom:1px solid #eee; }
.smallChart { max-width:300px; margin:auto; }
</style>
</head>
<body>
<div class="header">Sistema Cámaras PRO+</div>
<div class="container">

<div class="card">
<input id="buscador" placeholder="Buscar por serie o sucursal" onkeyup="cargarTodo()">
<select id="filtroEstado" onchange="cargarTodo()">
<option value="">Todos</option>
<option>Activa</option>
<option>Falla</option>
</select>
<input type="date" id="fi">
<input type="date" id="ff">
<button class="primary" onclick="exportar()">Exportar Excel</button>
</div>

<div class="card">
<h3>Cámaras</h3>
<input id="serie">
<select id="estado"><option>Activa</option><option>Falla</option></select>
<button class="success" onclick="guardarCamara()">Guardar</button>
<table><tbody id="tablaCamaras"></tbody></table>
</div>

<div class="card">
<h3>Incidencias</h3>
<select id="camaraSelect"></select>
<textarea id="desc"></textarea>
<input id="tecnico">
<button class="warning" onclick="addInc()">Guardar</button>
<table><tbody id="tablaInc"></tbody></table>
</div>

<div class="grid">
<div class="card">Total: <span id="total"></span></div>
<div class="card">Activas: <span id="act"></span></div>
<div class="card">Fallas: <span id="fall"></span></div>
<div class="card">Incidencias: <span id="inc"></span></div>
</div>

<div class="card smallChart"><canvas id="grafica"></canvas></div>



<div class="card">
<h3>Historial por cámara</h3>
<select id="histCam" onchange="historial()"></select>
<ul id="historialLista"></ul>
</div>

</div>

<script>
const firebaseConfig={apiKey:"AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",authDomain:"camaras-control.firebaseapp.com",projectId:"camaras-control"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
let chart,editId=null;

function guardarCamara(){
 let s=serie.value;
 if(editId){ db.collection('camaras').doc(editId).update({serie:s,estado:estado.value}); editId=null; }
 else{ db.collection('camaras').add({serie:s,estado:estado.value}); }
}

function eliminar(id){ if(confirm('¿Eliminar?')) db.collection('camaras').doc(id).delete(); }

function editar(id,s,e){ serie.value=s; estado.value=e; editId=id; }

function addInc(){ db.collection('incidencias').add({camara:camaraSelect.value,descripcion:desc.value,tecnico:tecnico.value,fecha:new Date().toISOString()}); }

function cargarTodo(){
 let b=buscador.value.toLowerCase();
 let f=filtroEstado.value;
 let fiVal=fi.value, ffVal=ff.value;
 let t=0,a=0,fa=0,i=0;
 let tecCount={};

 db.collection('camaras').onSnapshot(sn=>{
  tablaCamaras.innerHTML=''; camaraSelect.innerHTML=''; histCam.innerHTML='';
  sn.forEach(d=>{
   let c=d.data();
   if(b && !c.serie.toLowerCase().includes(b)) return;
   if(f && c.estado!=f) return;
   t++; if(c.estado=='Activa')a++; else fa++;
   tablaCamaras.innerHTML+=`<tr><td>${c.serie}</td><td>${c.estado}</td><td>
   <button onclick="editar('${d.id}','${c.serie}','${c.estado}')">✏️</button>
   <button onclick="eliminar('${d.id}')">🗑️</button></td></tr>`;
   camaraSelect.innerHTML+=`<option>${c.serie}</option>`;
   histCam.innerHTML+=`<option>${c.serie}</option>`;
  });
  total.innerText=t; act.innerText=a; fall.innerText=fa;
  if(chart)chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Activas','Fallas'],datasets:[{data:[a,fa]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML=''; i=0;
  sn.forEach(d=>{
   let x=d.data(); let fecha=x.fecha?.split('T')[0];
   if(fiVal && fecha<fiVal) return;
   if(ffVal && fecha>ffVal) return;
   i++;
   tablaInc.innerHTML+=`<tr><td>${x.camara}</td><td>${x.descripcion}</td><td>${x.tecnico}</td></tr>`;
   tecCount[x.tecnico]=(tecCount[x.tecnico]||0)+1;
  });
  inc.innerText=i;
  
 });
}

function historial(){
 let cam=histCam.value;
 historialLista.innerHTML='';
 db.collection('incidencias').where('camara','==',cam).onSnapshot(sn=>{
  sn.forEach(d=>{
   let i=d.data();
   historialLista.innerHTML+=`<li>${i.descripcion} - ${i.tecnico}</li>`;
  });
 });
}

function exportar(){
 let csv='Camara,Descripcion,Tecnico\n';
 document.querySelectorAll('#tablaInc tr').forEach(r=>{
  let c=r.children;
  csv+=`${c[0].innerText},${c[1].innerText},${c[2].innerText}\n`;
 });
 let blob=new Blob([csv]);
 let a=document.createElement('a'); a.href=URL.createObjectURL(blob);
 a.download='reporte.csv'; a.click();
}

cargarTodo();
</script>
</body>
</html>
