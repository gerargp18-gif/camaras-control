<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Cámaras - Reporte Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
input, select, textarea { padding:10px; margin:5px 0; width:100%; }
button { padding:8px 10px; margin:2px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>Sucursal</h2>
<input id="nuevaSucursal" placeholder="Nueva sucursal">
<button onclick="addSucursal()">Agregar</button>
<select id="sucursal" onchange="cargarTodo()"></select>
</div>

<div class="card">
<h2>Filtro por fechas</h2>
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="cargarTodo()">Aplicar filtro</button>
</div>

<div class="grid">
<div class="card">
<h3>Resumen</h3>
<p>Total cámaras: <span id="rTotal"></span></p>
<p>Activas: <span id="rActivas"></span></p>
<p>Fallas: <span id="rFallas"></span></p>
<p>Incidencias: <span id="rInc"></span></p>
</div>

<div class="card">
<h3>Incidencias por técnico</h3>
<ul id="tecnicos"></ul>
</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div class="card">
<h2>Incidencias</h2>
<select id="camaraSelect"></select>
<textarea id="desc" placeholder="Descripción"></textarea>
<input id="tecnico" placeholder="Técnico">
<button onclick="addInc()">Guardar</button>
<table><tbody id="tablaInc"></tbody></table>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVs7GnPPChdilJSk99WG1IPeLJKvEjxVc",
  authDomain: "camaras-control.firebaseapp.com",
  projectId: "camaras-control",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let chart;

function addSucursal(){ db.collection('sucursales').add({nombre:nuevaSucursal.value}); }

function addInc(){ db.collection('incidencias').add({
 camara:camaraSelect.value,
 descripcion:desc.value,
 tecnico:tecnico.value,
 fecha:new Date().toISOString()
}); }

function cargarSucursales(){
 db.collection('sucursales').onSnapshot(s=>{
  sucursal.innerHTML='';
  s.forEach(d=>sucursal.innerHTML+=`<option>${d.data().nombre}</option>`);
 });
}

function cargarTodo(){
 let s=sucursal.value;
 let fi=fechaInicio.value;
 let ff=fechaFin.value;
 let total=0,act=0,fall=0,inc=0;
 let conteoTec={};

 db.collection('camaras').where('sucursal','==',s).onSnapshot(sn=>{
  total=0;act=0;fall=0;
  sn.forEach(d=>{
    let c=d.data();
    total++;
    if(c.estado==='Activa') act++; else fall++;
    camaraSelect.innerHTML+=`<option>${c.serie}</option>`;
  });

  rTotal.innerText=total;
  rActivas.innerText=act;
  rFallas.innerText=fall;

  if(chart) chart.destroy();
  chart=new Chart(grafica,{type:'pie',data:{labels:['Activas','Fallas'],datasets:[{data:[act,fall]}]}});
 });

 db.collection('incidencias').onSnapshot(sn=>{
  tablaInc.innerHTML='';
  tecnicos.innerHTML='';
  inc=0;

  sn.forEach(d=>{
    let i=d.data();
    let fecha=i.fecha?.split('T')[0];

    if(fi && fecha < fi) return;
    if(ff && fecha > ff) return;

    inc++;
    tablaInc.innerHTML+=`<tr><td>${i.camara}</td><td>${i.descripcion}</td><td>${i.tecnico}</td><td>${fecha}</td></tr>`;

    conteoTec[i.tecnico]=(conteoTec[i.tecnico]||0)+1;
  });

  rInc.innerText=inc;

  for(let t in conteoTec){
    tecnicos.innerHTML+=`<li>${t}: ${conteoTec[t]} incidencias</li>`;
  }
 });
}

cargarSucursales();
</script>
</body>
</html>
